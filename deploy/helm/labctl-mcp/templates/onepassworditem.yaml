{{- if .Values.auth.onePasswordItem.itemPath }}
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "labctl-mcp.fullname" . }}-op-token
  labels:
    {{- include "labctl-mcp.labels" . | nindent 4 }}
spec:
  itemPath: {{ .Values.auth.onePasswordItem.itemPath | quote }}
{{- end }}
