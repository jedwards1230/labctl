# Default values for labctl-mcp.
# A portable chart: homelab-specific bits (OnePasswordItem, redirect-lan ingress)
# are opt-in via values, so the chart is reusable outside this homelab.

replicaCount: 1

image:
  repository: ghcr.io/jedwards1230/labctl
  # tag defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# MCP server invocation. These map to `labctl mcp` flags.
mcp:
  # Listen address passed to `labctl mcp --http`. Host omitted = all interfaces.
  http: ":9000"
  # HTTP path the streamable MCP handler is mounted at (informational; used for
  # the readiness/liveness note and any ingress path).
  path: /mcp
  # --read-only: expose only read tools, skip every write command.
  readOnly: false
  # --service allowlist; empty list = all services. e.g. [radarr, sonarr, truenas]
  services: []

# Files rendered into LABCTL_CONFIG_DIR (/config) via a ConfigMap.
# profileYaml is the per-environment binding (base_url + op:// secret refs);
# service manifests themselves are embedded in the labctl binary.
config:
  configYaml: ""
  profileYaml: ""
  # servicesYaml: optional map of service-name → manifest YAML string.
  # Each entry is rendered into a separate ConfigMap and mounted at
  # <config-dir>/services/<name>.yaml, overriding or supplementing the
  # embedded catalog — WITHOUT rebuilding the image.
  # Example:
  #   servicesYaml:
  #     radarr: |
  #       name: radarr
  #       auth: { strategy: header-key, ... }
  #       ...
  servicesYaml: {}

# 1Password service-account token used by `op` to resolve op:// refs.
# Pick exactly one source. existingSecret is the portable default; the homelab
# instance sets onePasswordItem.itemPath to have the 1Password operator mint it.
auth:
  env: OP_SERVICE_ACCOUNT_TOKEN
  existingSecret:
    name: ""
    key: token
  onePasswordItem:
    # Set itemPath to render a OnePasswordItem CRD (1Password operator).
    # e.g. vaults/homelab/items/k8s-mcp-gateway-labctl
    itemPath: ""
    # Key within the synced secret holding the token value.
    key: token

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls: false

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

# fsGroup matches the container's uid/gid (10001) so the writable emptyDir
# mounts (HOME, /tmp) are group-owned by the running user. This pod has no NFS,
# so the homelab fsGroup:100 convention doesn't apply here.
podSecurityContext:
  fsGroup: 10001
  # Set at both pod and container level: the container securityContext below is
  # what governs this (single) container, but keeping it at the pod level too
  # documents intent and provides the RuntimeDefault floor for any container
  # added later (e.g. a sidecar) that omits its own seccompProfile.
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

# NetworkPolicy for the MCP pod. The /mcp endpoint has NO app-layer auth, so
# network reachability IS the access boundary — enable this in any cluster that
# supports NetworkPolicy. Off by default to keep the chart portable.
networkPolicy:
  enabled: false
  ingress:
    # Raw NetworkPolicyPeer entries (podSelector/namespaceSelector/ipBlock)
    # allowed to reach the MCP port. Sources are OR-combined. Empty list while
    # enabled = default-deny ingress for this pod (no source may reach it).
    from: []
  egress:
    enabled: false
    # Raw egress rule objects ({to: [...], ports: [...]}). Empty list while
    # egress.enabled = default-deny egress for this pod.
    rules: []

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
