# CI for labctl: format check, vet, test (race + coverage), and a build smoke
# test. Runs on PRs and pushes to main.
name: CI

run-name: "CI: ${{ github.event.pull_request.title || github.event.head_commit.message || github.sha }}"

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage floor
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          floor=75
          echo "Total coverage: ${total}% (floor ${floor}%)"
          if awk "BEGIN{exit !(${total} < ${floor})}"; then
            echo "::error::coverage ${total}% is below the ${floor}% floor"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Summary
        if: always()
        run: |
          {
            echo "## CI"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Tests | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
