# labctl global config. Every field is optional; these are the defaults.
# Unknown top-level keys are an error (strict decoding) — a typo is rejected at
# load time rather than silently ignored.
version: 1
defaults:
  timeout: 60s      # per-request HTTP timeout
  output: json      # json | raw | scalar

# Scheme-dispatched secret providers. A ref routes to a provider by its URI
# scheme (op:// → the onepassword provider).
secrets:
  env_override: true                     # allow <PREFIX>_<SECRET> env to skip resolution
  providers:
    onepassword:                         # map key aliases to scheme: op
      scheme: op
      command: ["op", "read", "{ref}"]   # {ref} ← the op:// URI
      # Optional. Omit `auth` entirely to use the personal/desktop op session.
      # When set, OP_SERVICE_ACCOUNT_TOKEN is injected into the op subprocess
      # only (never argv, never logged). Exactly one of file | value | env.
      # auth:
      #   service_account_token:
      #     file: ~/.config/labctl/sa-token

# The legacy single-resolver `secret:` block is a still-supported deprecated alias.
