name: contextforge
description: ContextForge MCP Gateway (IBM mcp-context-forge) — federated tool registry, virtual servers, teams, and RBAC
env_prefix: CONTEXTFORGE

auth:
  strategy: bearer
  value: "{secret.token}"

secrets:
  token:
    env: CONTEXTFORGE_TOKEN

commands:
  gateways:
    help: registered upstream MCP gateway servers
    method: GET
    path: /gateways/
    output: { filter: "map({id,name,url,enabled})" }
  servers:
    help: virtual MCP servers
    method: GET
    path: /servers/
    output: { filter: "map({id,name,description})" }
  tools:
    help: all federated tools — field originalName is the tool's real name
    method: GET
    path: /tools
    output: { filter: "map({id,originalName,description})" }
  teams:
    help: RBAC teams
    method: GET
    # /teams (no slash) 307-redirects; the body is an object {teams:[...],total:N},
    # not a bare array — unwrap .teams before mapping.
    path: /teams/
    output: { filter: ".teams | map({id,name,description})" }
  roles:
    help: RBAC roles
    method: GET
    path: /rbac/roles
    output: { filter: "map({id,name,description})" }
  permissions:
    help: available RBAC permission vocabulary
    method: GET
    path: /rbac/permissions/available
  tokens:
    # Token management is walled off to interactive web/SSO sessions: a plain API
    # token (the default bearer auth here) gets HTTP 403. Override CONTEXTFORGE_TOKEN
    # with a web-login/SSO JWT to use this. GET /tokens/{id} also hides scope —
    # decode the JWT to confirm.
    help: API tokens (interactive web/SSO JWT only — API tokens get 403)
    method: GET
    path: /tokens
    output: { filter: "map({id,name})" }
